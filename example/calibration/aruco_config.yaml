aruco_dict:
  predefined: DICT_4X4_50

marker_size_map:
  default: 0.16

  # 夹爪指尖 tag（左指=0，右指=1）
  # 黑色方块外沿实测边长（米），不含白边
  # 打印出来若"含白边 2cm × 2cm"且黑方块本身=20mm，填 0.020
  # 若整张纸才 20mm、黑方块更小，务必改成实测值
  0: 0.020
  1: 0.020

  # 多夹爪预留（单夹爪不用，可忽略）
  6: 0.020
  7: 0.020
  12: 0.020
  13: 0.020

  # 工作区锚点 tag（建议 ID 选 14–19，避免和未来 gp02 的 12/13 冲突）
  # 若打印成 A4 纸大的，按实测填
  14: 0.16
  15: 0.16
  16: 0.16
  17: 0.16
  18: 0.16
  19: 0.16
